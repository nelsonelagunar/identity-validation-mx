# Kubernetes Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mexico-identity-api
  labels:
    app: mexico-identity
    component: api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: mexico-identity
      component: api
  template:
    metadata:
      labels:
        app: mexico-identity
        component: api
    spec:
      containers:
      - name: api
        image: mexico-identity-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: mexico-identity-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: mexico-identity-secrets
              key: redis-url
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: mexico-identity-secrets
              key: secret-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 8000
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: mexico-identity-api
spec:
  selector:
    app: mexico-identity
    component: api
  ports:
  - port: 80
    targetPort: 8000
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: mexico-identity-ingress
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  tls:
  - hosts:
    - api.mexico-identity.example.com
    secretName: mexico-identity-tls
  rules:
  - host: api.mexico-identity.example.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: mexico-identity-api
            port:
              number: 80