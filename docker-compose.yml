version: "3.8"

services:
  api:
    build: .
    container_name: mexico-identity-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/mexico_identity
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=false
    depends_on:
      - db
      - redis
    networks:
      - mexico-identity-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    container_name: mexico-identity-db
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=mexico_identity
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - mexico-identity-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: mexico-identity-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mexico-identity-network
    restart: unless-stopped

  # Optional: Prometheus for metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: mexico-identity-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    networks:
      - mexico-identity-network
    restart: unless-stopped
    profiles:
      - monitoring

  # Optional: Grafana for dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: mexico-identity-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - mexico-identity-network
    restart: unless-stopped
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  mexico-identity-network:
    driver: bridge