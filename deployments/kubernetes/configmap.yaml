apiVersion: v1
kind: ConfigMap
metadata:
  name: identity-validation-config
  namespace: identity-validation
  labels:
    app: identity-validation-mx
data:
  APP_ENV: "production"
  APP_PORT: "8080"
  DB_HOST: "postgres"
  DB_PORT: "5432"
  DB_NAME: "identity_db"
  DB_SSLMODE: "require"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  LOG_LEVEL: "info"
  LOG_FORMAT: "json"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rate-limit-config
  namespace: identity-validation
  labels:
    app: identity-validation-mx
    component: rate-limiter
data:
  RATE_LIMIT_REQUESTS: "100"
  RATE_LIMIT_WINDOW: "60s"
  RATE_LIMIT_BURST: "20"
  RATE_LIMIT_STRATEGY: "sliding-window"
  RATE_LIMIT_KEY_PREFIX: "identity-validation"